services:
  applet:
    image: node:20-bookworm
    container_name: ${CONTAINER_NAME:-test-container}
    restart: unless-stopped
    # Keep the container running indefinitely
    command: tail -f /dev/null
    volumes:
      # Mounts the /app directory in a temporary directory on the host machine
      - ${WORKSPACE_HOST_LOCATION:-/tmp/applet_workspace}:/app
    environment:
      - NODE_ENV=development
    # Hardening: the orchestrator auto-executes LLM-generated commands in this
    # container with no human confirmation step (see ORCH-REQ-012/013), so this
    # boundary is the primary backstop rather than a secondary layer.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    # Resource ceilings: pids_limit alone doesn't stop a single process from
    # exhausting host memory/CPU, and the /app bind mount is otherwise
    # unbounded, so cap all three explicitly.
    mem_limit: ${APPLET_MEM_LIMIT:-2g}
    memswap_limit: ${APPLET_MEM_LIMIT:-2g}
    cpus: ${APPLET_CPU_LIMIT:-2}
    # Root filesystem is read-only; only /app (the bind-mounted workspace) and
    # /tmp are writable. This limits blast radius of arbitrary auto-executed
    # commands beyond the workspace itself.
    read_only: true
    tmpfs:
      - /tmp
    # No explicit network policy is set here yet — auto-executed commands can
    # currently reach the network freely. Tracked separately; see ORCH-REQ-012.
